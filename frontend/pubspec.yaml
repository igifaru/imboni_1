name: imboni
description: Imboni - Rwanda National Civic Governance Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.1.0
  
  # State Management & Storage
  shared_preferences: ^2.2.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  fl_chart: ^1.1.1
  
  # Media & Files
  image_picker: ^1.1.2
  file_picker: ^8.0.0+1
  
  # Audio Recording & Playback
  record: ^6.1.2
  audioplayers: ^6.1.0
  url_launcher: ^6.3.2
  intl: ^0.20.2

  provider: any
  syncfusion_flutter_pdfviewer: ^32.1.24
  video_player: ^2.10.1
  chewie: ^1.13.0
  fvp: ^0.35.2
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  excel: ^4.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
